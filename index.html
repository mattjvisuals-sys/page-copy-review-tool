<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copy Review Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:#0f1722;color:#F4F2EC;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:60px 24px}

.logo{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#98C1D9;margin-bottom:8px}
h1{font-size:clamp(28px,4vw,38px);font-weight:900;margin-bottom:12px;text-align:center}
h1 span{color:#DD604C}
.subtitle{font-size:15px;color:rgba(244,242,236,0.5);text-align:center;margin-bottom:40px;max-width:500px}

.card{background:rgba(255,255,255,0.04);border:1px solid rgba(152,193,217,0.12);border-radius:20px;padding:36px;max-width:680px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.2)}

.tabs{display:flex;gap:4px;margin-bottom:24px;background:rgba(255,255,255,0.04);border-radius:10px;padding:4px}
.tab{flex:1;padding:10px 16px;border:none;border-radius:8px;background:none;color:rgba(244,242,236,0.4);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s}
.tab.active{background:rgba(221,96,76,0.15);color:#DD604C;border:1px solid rgba(221,96,76,0.25)}

.tab-content{display:none}
.tab-content.active{display:block}

label{display:block;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(152,193,217,0.5);margin-bottom:8px}

input[type="url"]{width:100%;padding:14px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(152,193,217,0.12);border-radius:10px;font-family:inherit;font-size:14px;color:#F4F2EC;transition:border-color 0.2s}
input[type="url"]:focus{outline:none;border-color:#DD604C;box-shadow:0 0 0 3px rgba(221,96,76,0.12)}
input[type="url"]::placeholder{color:rgba(244,242,236,0.2)}

textarea{width:100%;min-height:200px;padding:14px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(152,193,217,0.12);border-radius:10px;font-family:'Courier New',monospace;font-size:12px;color:#F4F2EC;resize:vertical;line-height:1.5}
textarea:focus{outline:none;border-color:#DD604C;box-shadow:0 0 0 3px rgba(221,96,76,0.12)}
textarea::placeholder{color:rgba(244,242,236,0.2)}

.or-upload{display:flex;align-items:center;gap:12px;margin-top:12px}
.or-upload span{font-size:12px;color:rgba(244,242,236,0.3)}
.file-btn{padding:6px 14px;border-radius:6px;border:1px solid rgba(152,193,217,0.15);background:rgba(255,255,255,0.04);color:rgba(244,242,236,0.5);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer}
.file-btn:hover{color:#F4F2EC;border-color:rgba(152,193,217,0.3)}
#file-input{display:none}
#file-name{font-size:12px;color:#98C1D9;font-weight:600}

.generate-btn{display:block;width:100%;margin-top:24px;padding:16px;background:linear-gradient(135deg,#DD604C,#e8755f);color:#fff;font-size:16px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase;border:none;border-radius:12px;cursor:pointer;transition:all 0.2s;font-family:inherit}
.generate-btn:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(221,96,76,0.4)}
.generate-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}

.status{margin-top:16px;font-size:13px;color:rgba(244,242,236,0.5);text-align:center;min-height:20px}
.status.error{color:#DD604C}
.status.success{color:#4ade80}

.output{display:none;margin-top:24px;padding-top:24px;border-top:1px solid rgba(152,193,217,0.08)}
.output-info{font-size:13px;color:rgba(244,242,236,0.5);margin-bottom:16px;text-align:center}
.output-info strong{color:#4ade80}
.output-btns{display:flex;gap:10px;justify-content:center}
.out-btn{padding:10px 20px;border-radius:8px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s}
.out-btn-primary{background:#4ade80;color:#0f1722}
.out-btn-primary:hover{background:#22c55e}
.out-btn-secondary{background:rgba(255,255,255,0.06);color:rgba(244,242,236,0.6);border:1px solid rgba(152,193,217,0.12)}
.out-btn-secondary:hover{color:#fff}

.footer{margin-top:auto;padding-top:48px;font-size:11px;color:rgba(244,242,236,0.2);text-align:center}
</style>
</head>
<body>

<div class="logo">Universal Tool</div>
<h1>Copy <span>Review</span> Generator</h1>
<p class="subtitle">Paste a URL or HTML — get a clickable review page your team can use to suggest copy changes.</p>

<div class="card">
<div class="tabs">
<button class="tab active" onclick="switchTab('url')">Paste URL</button>
<button class="tab" onclick="switchTab('html')">Paste HTML</button>
</div>

<div class="tab-content active" id="tab-url">
<label>Page URL</label>
<input type="url" id="url-input" placeholder="https://example.com/sales-page">
</div>

<div class="tab-content" id="tab-html">
<label>HTML Source</label>
<textarea id="html-input" placeholder="<!DOCTYPE html>&#10;<html>&#10;  Paste your full HTML here...&#10;</html>"></textarea>
<div class="or-upload">
<span>or</span>
<button class="file-btn" onclick="document.getElementById('file-input').click()">Upload .html file</button>
<input type="file" id="file-input" accept=".html,.htm" onchange="handleFile(this)">
<span id="file-name"></span>
</div>
</div>

<button class="generate-btn" id="gen-btn" onclick="generate()">Generate Review Page</button>
<div class="status" id="status"></div>

<div class="output" id="output">
<p class="output-info"><strong id="tag-count">0</strong> text elements auto-tagged for review</p>
<div class="output-btns">
<button class="out-btn out-btn-primary" onclick="downloadOutput()">Download HTML</button>
<button class="out-btn out-btn-secondary" onclick="previewOutput()">Preview in New Tab</button>
<button class="out-btn out-btn-secondary" onclick="copyOutput()">Copy HTML</button>
</div>
</div>
</div>

<div class="footer">Universal Copy Review Generator</div>

<script src="generator.js"></script>
<script>
var currentTab = 'url';
var generatedHTML = '';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.tab-content').forEach(function(t){ t.classList.remove('active'); });
  document.querySelector('.tab-content#tab-' + tab).classList.add('active');
  event.target.classList.add('active');
}

function handleFile(input) {
  var file = input.files[0];
  if (!file) return;
  document.getElementById('file-name').textContent = file.name;
  var reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('html-input').value = e.target.result;
  };
  reader.readAsText(file);
}

function setStatus(msg, type) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (type ? ' ' + type : '');
}

async function generate() {
  var btn = document.getElementById('gen-btn');
  btn.disabled = true;
  document.getElementById('output').style.display = 'none';
  setStatus('Processing...');

  try {
    var html = '';

    if (currentTab === 'url') {
      var url = document.getElementById('url-input').value.trim();
      if (!url) { setStatus('Please enter a URL', 'error'); btn.disabled = false; return; }
      setStatus('Fetching page...');
      var resp = await fetch('/api/fetch?url=' + encodeURIComponent(url));
      if (!resp.ok) {
        var errData = await resp.json().catch(function(){ return {}; });
        throw new Error(errData.error || 'Failed to fetch page (status ' + resp.status + ')');
      }
      var data = await resp.json();
      html = data.html;
    } else {
      html = document.getElementById('html-input').value.trim();
      if (!html) { setStatus('Please paste HTML or upload a file', 'error'); btn.disabled = false; return; }
    }

    setStatus('Tagging text elements...');

    var result = CopyReview.buildReviewPage(html);
    generatedHTML = result.html;

    document.getElementById('tag-count').textContent = result.count;
    document.getElementById('output').style.display = 'block';
    setStatus('Done! ' + result.count + ' elements tagged.', 'success');
  } catch(err) {
    setStatus('Error: ' + err.message, 'error');
  }

  btn.disabled = false;
}

function downloadOutput() {
  var blob = new Blob([generatedHTML], { type: 'text/html' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'copy-review.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

function previewOutput() {
  var blob = new Blob([generatedHTML], { type: 'text/html' });
  var url = URL.createObjectURL(blob);
  window.open(url, '_blank');
}

function copyOutput() {
  navigator.clipboard.writeText(generatedHTML).then(function() {
    setStatus('HTML copied to clipboard!', 'success');
  });
}
</script>
</body>
</html>
